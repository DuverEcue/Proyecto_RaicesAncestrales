<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin — Raíces Ancestrales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ── Paleta de colores inspirada en la naturaleza (ISO 25010: Estética) ── */
        :root {
            --verde-oscuro  : #2d5a27;
            --verde-medio   : #4a7c40;
            --verde-claro   : #6baa5e;
            --verde-suave   : #d6eacf;
            --tierra        : #8b6914;
            --crema         : #f5f0e8;
            --borde         : #b8d9b0;
        }

        body {
            background-color: var(--crema);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            color: #2c2c2c;
        }

        /* ── Cabecera con Degradado ── */
        .admin-header {
            background: linear-gradient(135deg, var(--verde-oscuro) 0%, var(--verde-medio) 100%);
            color: #fff;
            padding: 2.5rem 2rem;
            border-radius: 0 0 2rem 2rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 4px 20px rgba(45, 90, 39, 0.3);
            text-align: center;
        }

        .admin-header h2 {
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        /* ── Contenedor de la Tabla (Card) ── */
        .card-admin {
            background: #ffffff;
            border: 1px solid var(--borde);
            border-radius: 1.2rem;
            box-shadow: 0 10px 30px rgba(107, 170, 94, 0.1);
            overflow: hidden; /* Mantiene los bordes redondeados con la tabla dentro */
        }

        /* ── Estilos de Tabla ── */
        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background-color: var(--verde-oscuro);
            color: #ffffff;
            font-weight: 600;
            border: none;
            padding: 1rem;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .table tbody tr {
            transition: background-color 0.3s ease;
        }

        .table tbody tr:hover {
            background-color: var(--verde-suave) !important;
        }

        .id-badge {
            font-size: 0.75rem;
            color: var(--tierra);
            font-family: 'Courier New', Courier, monospace;
            background: #fdf3d0;
            border: 1px solid #f2e1a5;
            border-radius: 0.5rem;
            padding: 0.2rem 0.6rem;
            font-weight: bold;
        }

        /* ── Elementos UI ── */
        .badge-count {
            background-color: var(--verde-claro);
            color: #fff;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-volver {
            background-color: var(--verde-oscuro);
            color: #fff;
            border: none;
            border-radius: 0.8rem;
            padding: 0.7rem 1.8rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-volver:hover {
            background-color: var(--verde-medio);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .leaf-divider {
            text-align: center;
            color: var(--verde-claro);
            font-size: 1.5rem;
            margin: 1.5rem 0;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <h2>🌿 Raíces Ancestrales</h2>
        <p class="mb-0 opacity-75">Panel de Gestión de Usuarios y Saberes</p>
    </header>

    <main class="container pb-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center gap-3">
                <h4 class="mb-0 fw-bold" style="color: var(--verde-oscuro);">Comunidad Registrada</h4>
                <span class="badge-count" id="contadorUsuarios">0</span>
            </div>
        </div>

        <div class="leaf-divider">🍃 · 🌱 · 🍃</div>

        <div class="card-admin shadow-sm">
            <div class="table-responsive">
                <table class="table align-middle" id="tablaPrincipal">
                    <thead>
                        <tr>
                            <th scope="col">ID Registro</th>
                            <th scope="col">Nombre Completo</th>
                            <th scope="col">Correo Electrónico</th>
                            <th scope="col">Ciudad</th>
                            <th scope="col" class="text-center">Gestión</th>
                        </tr>
                    </thead>
                    <tbody id="tablaUsuarios">
                        </tbody>
                </table>
            </div>

            <div class="text-center py-5 d-none" id="estadoVacio">
                <div class="display-1 text-muted opacity-25">🌾</div>
                <h5 class="mt-3 text-secondary">Aún no hay guardianes registrados</h5>
                <p class="text-muted small">Los nuevos registros aparecerán aquí automáticamente.</p>
            </div>
        </div>

        <div class="mt-4">
            <a href="index.html" class="btn-volver shadow-sm">
                <i class="bi bi-arrow-left"></i> ← Volver al Portal Principal
            </a>
        </div>
    </main>

    <script src="js/admin.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
