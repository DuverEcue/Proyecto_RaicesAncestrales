<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Plantas Medicinales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

    <form class="row g-3" id="formRegistro">
        <h3>🌿 Registro de usuario</h3>
        <div class="col-md-6">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" id="Nombre" placeholder="Nombre completo">
        </div>
        <div class="col-md-6">
            <label class="form-label">Correo</label>
            <input type="email" class="form-control" id="correo" placeholder="ej: juan@gmail.com">
        </div>
        <div class="col-12">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="Password" placeholder="Mínimo 8 caracteres">
        </div>
        <div class="col-12">
            <label class="form-label">Dirección</label>
            <input type="text" class="form-control" id="Direccion" placeholder="Calle principal 123">
        </div>
        <div class="col-md-6">
            <label class="form-label">Ciudad</label>
            <input type="text" class="form-control" id="Ciudad" placeholder="Donde vives">
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Registrarse</button>
        </div>
        <div class="col-12 text-center mt-3">
            <a href="index.html">← Volver al inicio</a>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
